<!DOCTYPE html>
<html>

<head>

<title>Customers</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{

display:flex;
background:
linear-gradient(
135deg,
#021B79,
#0575E6
);

min-height:100vh;
color:white;

}



/* SIDEBAR */

.sidebar{

width:240px;
background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

padding:25px;

height:100vh;

position:fixed;

border-right:
1px solid rgba(255,255,255,0.2);

}


.sidebar h2{

margin-bottom:30px;
text-align:center;
font-size:28px;

color:#fff;

}


.sidebar a{

display:block;

text-decoration:none;

color:white;

padding:14px;

margin:12px 0;

border-radius:15px;

background:rgba(255,255,255,0.08);

transition:0.4s;

font-weight:500;

}


.sidebar a:hover{

background:
linear-gradient(
45deg,
#ff416c,
#ff4b2b
);

transform:translateX(5px);

}



/* MAIN CONTENT */

.main-content{

margin-left:260px;
padding:30px;
width:100%;

}


.main-content h1{

margin-bottom:20px;
font-size:35px;

}



/* INPUT CARDS */

.input-section{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}


.input-card{

background:
rgba(255,255,255,0.12);

padding:20px;

border-radius:20px;

backdrop-filter:blur(10px);

box-shadow:
0 8px 20px rgba(0,0,0,0.2);

transition:0.4s;

}


.input-card:hover{

transform:translateY(-5px);

}


.input-card label{

display:block;
margin-bottom:8px;
font-size:14px;

}


.input-card input{

width:100%;
padding:12px;

border:none;

outline:none;

border-radius:12px;

background:
rgba(255,255,255,0.2);

color:white;

font-size:15px;

}


.input-card input::placeholder{

color:#ddd;

}



/* BUTTONS */

.buttons{

margin-bottom:25px;

display:flex;
gap:15px;
flex-wrap:wrap;

}


.buttons button{

padding:14px 24px;

border:none;

border-radius:15px;

background:
linear-gradient(
45deg,
#ff416c,
#ff4b2b
);

color:white;

font-size:15px;

cursor:pointer;

transition:0.4s;

font-weight:600;

box-shadow:
0 5px 15px rgba(0,0,0,0.3);

}


.buttons button:hover{

transform:scale(1.05);

}



/* TABLE */

table{

width:100%;

border-collapse:collapse;

background:
rgba(255,255,255,0.1);

backdrop-filter:blur(10px);

border-radius:20px;

overflow:hidden;

box-shadow:
0 10px 30px rgba(0,0,0,0.3);

}


table th{

background:
rgba(255,255,255,0.15);

padding:16px;

font-size:15px;

}


table td{

padding:14px;

text-align:center;

border-bottom:
1px solid rgba(255,255,255,0.1);

}


table tr:hover{

background:
rgba(255,255,255,0.08);

}



/* ACTION BUTTONS */

.action-btn{

padding:8px 12px;

border:none;

border-radius:10px;

margin:2px;

cursor:pointer;

font-size:13px;

font-weight:600;

color:white;

}


.edit-btn{

background:#007bff;

}


.delete-btn{

background:#dc3545;

}


.paid-btn{

background:#28a745;

}



/* SEARCH */

.search-box{

margin-bottom:20px;

display:flex;
gap:10px;

}


.search-box input{

padding:14px;

width:300px;

border:none;

outline:none;

border-radius:15px;

background:
rgba(255,255,255,0.15);

color:white;

}


.search-box button{

padding:14px 20px;

border:none;

border-radius:15px;

background:#00c6ff;

color:white;

cursor:pointer;

font-weight:600;

}



/* RESPONSIVE */

@media(max-width:768px){

.sidebar{

width:100%;
height:auto;
position:relative;

}


.main-content{

margin-left:0;

}


body{

flex-direction:column;

}

}

</style>

</head>

<body>

<div class="sidebar">

<h2>RD System</h2>

<a href="dashboard.html">Dashboard</a>

<a href="customers.html">Customers</a>

<a href="reports.html">Reports</a>

</div>



<div class="main-content">

<h1>Customer Management</h1>



<!-- SEARCH -->

<div class="search-box">

<input
type="text"
id="searchAccount"
placeholder="Search by Account Number">

<button onclick="searchCustomer()">

Search

</button>

</div>



<!-- INPUT SECTION -->

<div class="input-section">

<div class="input-card">

<label>Name</label>

<input type="text" id="name" placeholder="Enter Name">

</div>


<div class="input-card">

<label>Age</label>

<input type="number" id="age" placeholder="Enter Age">

</div>


<div class="input-card">

<label>Account Number</label>

<input type="text" id="account" placeholder="Enter Account Number">

</div>


<div class="input-card">

<label>Mobile Number</label>

<input type="text" id="phone" placeholder="Enter Mobile Number">

</div>


<div class="input-card">

<label>Monthly Amount</label>

<input type="number" id="amount" placeholder="Enter Amount">

</div>


<div class="input-card">

<label>Due Date</label>

<input type="date" id="dueDate">

</div>

</div>



<!-- BUTTONS -->

<div class="buttons">

<button onclick="addCustomer()">

Add Customer

</button>

</div>



<!-- TABLE -->

<table id="customerTable">

<tr>

<th>Name</th>
<th>Age</th>
<th>Account</th>
<th>Phone</th>
<th>Amount</th>
<th>Due Date</th>
<th>Status</th>
<th>Action</th>

</tr>

</table>

</div>

<script src="script.js"></script>

</body>

</html>
