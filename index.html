<!DOCTYPE html>
<html>

<head>
<title>Post Office RD System</title>

<style>

body{
font-family:Arial,sans-serif;
background:#e9edf2;
}

.login-container{

width:400px;
margin:100px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;

}

h1{

text-align:center;

}

input{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;

}

button{

width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;

}

button:hover{

background:#0056b3;

}

</style>

</head>

<body>

<div class="login-container">

<h1>Post Office RD Management</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>


<script>

function login(){

let username=
document.getElementById("username").value.trim();

let password=
document.getElementById("password").value.trim();


if(username==="admin" && password==="12345")
{

alert("Login Successful");

window.location.href="./dashboard.html";

}
else
{

alert("Username: admin\nPassword: 12345");

}

}

</script>

</body>

</html>
